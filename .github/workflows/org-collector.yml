name: altair infrastructure daemon

on:

  push:
    branches:
      - "**"

  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

  issues:
    types:
      - opened
      - reopened
      - closed

  release:
    types:
      - published

  workflow_run:
    types:
      - completed

  workflow_dispatch:


concurrency:
  group: altair-org-collector
  cancel-in-progress: false


permissions:
  contents: read
  actions: read
  issues: read
  pull-requests: read


jobs:

  daemon:

    name: altair event collector
    runs-on: ubuntu-latest

    env:
      ORG_GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}

      DISCORD_WEBHOOK_RELEASE: ${{ secrets.DISCORD_WEBHOOK_RELEASE }}
      DISCORD_WEBHOOK_KERNEL_COMMITS: ${{ secrets.DISCORD_WEBHOOK_KERNEL_COMMITS }}
      DISCORD_WEBHOOK_KERNEL_PR: ${{ secrets.DISCORD_WEBHOOK_KERNEL_PR }}
      DISCORD_WEBHOOK_KERNEL_ISSUES: ${{ secrets.DISCORD_WEBHOOK_KERNEL_ISSUES }}
      DISCORD_WEBHOOK_CI: ${{ secrets.DISCORD_WEBHOOK_CI }}

    steps:

      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup node runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install runtime dependencies
        run: npm install axios

      - name: run altair collector daemon
        run: node scripts/org-collector.js
