name: Altair-Linux Org Collector

# ─────────────────────────────────────────────────────────────────────────────
# Trigger on every event type the collector can process.
# push            – new commits pushed to any branch
# pull_request    – PRs opened, reopened, synchronized, or closed
# issues          – issues opened, reopened, closed, or edited
# release         – releases published
# create / delete – branches or tags created / deleted
# workflow_run    – workflow completions (for CI status reporting)
# workflow_dispatch – manual trigger for testing
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, reopened, synchronize, closed]
  issues:
    types: [opened, reopened, closed, edited]
  release:
    types: [published]
  create:
  delete:
  workflow_run:
    workflows: ["*"]
    types: [completed]
  workflow_dispatch:

jobs:
  collect-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Org Collector
        run: node scripts/org-collector.js
        env:
          # GitHub API token for reading org repos
          ORG_GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          # Separate Discord webhook URLs per event type
          # NOTE: Secret names use "KERNEL_" prefix for historical reasons;
          #       the env vars consumed by the script omit it for generality.
          DISCORD_WEBHOOK_COMMITS: ${{ secrets.DISCORD_WEBHOOK_KERNEL_COMMITS }}
          DISCORD_WEBHOOK_PR: ${{ secrets.DISCORD_WEBHOOK_KERNEL_PR }}
          DISCORD_WEBHOOK_ISSUES: ${{ secrets.DISCORD_WEBHOOK_KERNEL_ISSUES }}
          DISCORD_WEBHOOK_RELEASE: ${{ secrets.DISCORD_WEBHOOK_RELEASE }}
          DISCORD_WEBHOOK_CI: ${{ secrets.DISCORD_WEBHOOK_CI }}
          # GitHub-provided context for event-driven processing
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}

      # ── Repository Dashboard ───────────────────────────────────────────
      # Updates a single Discord message with an overview of every repo
      # in the organisation (branches, releases, commits, PRs, issues).
      - name: Restore Dashboard State
        uses: actions/cache/restore@v4
        with:
          path: .dashboard-state.json
          key: dashboard-state-${{ github.run_id }}
          restore-keys: |
            dashboard-state-

      - name: Update Repository Dashboard
        run: node scripts/dashboard.js
        env:
          ORG_GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          DISCORD_WEBHOOK_DASHBOARD: ${{ secrets.DISCORD_WEBHOOK_DASHBOARD }}

      - name: Save Dashboard State
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .dashboard-state.json
          key: dashboard-state-${{ github.run_id }}
