name: Altair Linux Discord Webhooks

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, edited, closed, reopened, assigned, unassigned, review_requested, review_request_removed]
  release:
    types: [published, created, edited, deleted]
  issues:
    types: [opened, edited, closed, reopened, assigned, unassigned, labeled, unlabeled]
  workflow_run:
    types: [requested, completed]

jobs:
  discord_notify:
    runs-on: ubuntu-latest
    steps:

      # Step 1: Determine the GitHub event type
      - name: Set event type
        id: set-event
        run: echo "EVENT_NAME=${GITHUB_EVENT_NAME}" >> $GITHUB_ENV

      # Step 2: /releases
      - name: Send release notification
        if: env.EVENT_NAME == 'release'
        uses: actions/http-client@v1
        with:
          url: ${{ secrets.DISCORD_WEBHOOK_RELEASE }}
          method: POST
          headers: |
            Content-Type: application/json
          body: |
            {
              "username": "release-daemon",
              "avatar_url": "https://raw.githubusercontent.com/Altair-Linux/altair-branding/refs/heads/main/logos/altair-logo-monochrome.svg",
              "embeds": [
                {
                  "title": "Release: ${{ github.event.release.tag_name }}",
                  "url": "${{ github.event.release.html_url }}",
                  "description": "${{ github.event.release.name }}\n${{ github.event.release.body }}",
                  "color": 16711680,
                  "footer": {"text": "Altair Linux - Webhooks Repo"}
                }
              ]
            }

      # Step 3: kernel/commits
      - name: Send push notifications
        if: env.EVENT_NAME == 'push'
        uses: actions/http-client@v1
        with:
          url: ${{ secrets.DISCORD_WEBHOOK_KERNEL_COMMITS }}
          method: POST
          headers: |
            Content-Type: application/json
          body: |
            {
              "username": "repo-sync",
              "avatar_url": "https://raw.githubusercontent.com/Altair-Linux/altair-branding/refs/heads/main/logos/altair-logo-monochrome.svg",
              "embeds": [
                {
                  "title": "Push to ${{ github.repository }}",
                  "url": "${{ github.event.compare }}",
                  "description": "${{ github.actor }} pushed ${{ github.event.commits | length }} commit(s) to branch ${{ github.ref }}",
                  "color": 65280,
                  "footer": {"text": "Altair Linux - Webhooks Repo"}
                }
              ]
            }

      # Step 4: kernel/code-review
      - name: Send pull request notifications
        if: env.EVENT_NAME == 'pull_request'
        uses: actions/http-client@v1
        with:
          url: ${{ secrets.DISCORD_WEBHOOK_KERNEL_PR }}
          method: POST
          headers: |
            Content-Type: application/json
          body: |
            {
              "username": "repo-sync",
              "avatar_url": "https://raw.githubusercontent.com/Altair-Linux/altair-branding/refs/heads/main/logos/altair-logo-monochrome.svg",
              "embeds": [
                {
                  "title": "Pull Request #${{ github.event.pull_request.number }} in ${{ github.repository }}",
                  "url": "${{ github.event.pull_request.html_url }}",
                  "description": "${{ github.event.pull_request.title }}\nBy: ${{ github.event.pull_request.user.login }}",
                  "color": 16753920,
                  "footer": {"text": "Altair Linux - Webhooks Repo"}
                }
              ]
            }

      # Step 5: kernel/issues
      - name: Send issue notifications
        if: env.EVENT_NAME == 'issues'
        uses: actions/http-client@v1
        with:
          url: ${{ secrets.DISCORD_WEBHOOK_KERNEL_ISSUES }}
          method: POST
          headers: |
            Content-Type: application/json
          body: |
            {
              "username": "repo-sync",
              "avatar_url": "https://raw.githubusercontent.com/Altair-Linux/altair-branding/refs/heads/main/logos/altair-logo-monochrome.svg",
              "embeds": [
                {
                  "title": "Issue #${{ github.event.issue.number }} in ${{ github.repository }}",
                  "url": "${{ github.event.issue.html_url }}",
                  "description": "${{ github.event.issue.title }}\nBy: ${{ github.event.issue.user.login }}",
                  "color": 16776960,
                  "footer": {"text": "Altair Linux - Webhooks Repo"}
                }
              ]
            }

      # Step 6: infrastructure/ci
      - name: Send workflow run notifications
        if: env.EVENT_NAME == 'workflow_run'
        uses: actions/http-client@v1
        with:
          url: ${{ secrets.DISCORD_WEBHOOK_CI }}
          method: POST
          headers: |
            Content-Type: application/json
          body: |
            {
              "username": "ci-runner",
              "avatar_url": "https://raw.githubusercontent.com/Altair-Linux/altair-branding/refs/heads/main/logos/altair-logo-monochrome.svg",
              "embeds": [
                {
                  "title": "Workflow ${{ github.event.workflow_run.name }} - ${{ github.event.workflow_run.conclusion }}",
                  "url": "${{ github.event.workflow_run.html_url }}",
                  "description": "Triggered by ${{ github.actor }}",
                  "color": 255,
                  "footer": {"text": "Altair Linux - Webhooks Repo"}
                }
              ]
            }
